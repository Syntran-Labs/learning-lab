spec:
  name: BitcoinPriceFetcher
  description: Servicio específico para obtener precio de Bitcoin
  parent: PriceFetcher
  version: 1.0.0

scenarios:
  - name: "Bitcoin debe cotizar en USD"
    given:
      - "Se solicita el precio de Bitcoin sin especificar moneda"
    when:
      - "Se obtiene el precio"
    then:
      - "La moneda es 'USD'"
      - "El símbolo es 'BTC'"

  - name: "Precio de Bitcoin es razonable"
    given:
      - "Se obtiene el precio de Bitcoin"
    when:
      - "El precio es procesado"
    then:
      - "El precio está entre 1,000 y 200,000 USD"
      - "No hay decimales inusuales (máximo 8 decimales)"

  - name: "Bitcoin identifica correctamente su símbolo"
    given:
      - "Se solicita información de Bitcoin"
    when:
      - "Se obtiene la respuesta"
    then:
      - "El símbolo es 'BTC'"
      - "El nombre es 'Bitcoin'"
      - "El asset_id es válido"

data_types:
  BitcoinPrice:
    symbol: string # "BTC"
    name: string # "Bitcoin"
    price: float # > 0
    currency: string # "USD"
    timestamp: datetime # ISO 8601
    change_24h: float # Porcentaje de cambio en 24 horas
    source: string # API source identifier

examples:
  valid_bitcoin_price:
    symbol: "BTC"
    name: "Bitcoin"
    price: 45000.50
    currency: "USD"
    timestamp: "2026-06-09T10:30:00Z"
    change_24h: 2.5
    source: "coingecko"

  another_valid_price:
    symbol: "BTC"
    name: "Bitcoin"
    price: 67890.75
    currency: "USD"
    timestamp: "2026-06-09T11:45:00Z"
    change_24h: -1.2
    source: "coinmarketcap"
