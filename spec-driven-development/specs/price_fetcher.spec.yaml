spec:
  name: PriceFetcher
  description: Sistema para obtener precios de activos financieros
  version: 1.0.0

scenarios:
  - name: "Obtener precio de Bitcoin"
    given:
      - "El servicio de precios está disponible"
      - "Bitcoin es un activo válido"
    when:
      - "Se solicita el precio de Bitcoin"
    then:
      - "Se retorna un precio numérico válido"
      - "El precio es mayor a 0"
      - "Se incluye la moneda (USD por defecto)"
      - "Se incluye el timestamp de la consulta"

  - name: "Obtener precio de Oro"
    given:
      - "El servicio de precios está disponible"
      - "Oro es un activo válido"
    when:
      - "Se solicita el precio de Oro"
    then:
      - "Se retorna un precio numérico válido"
      - "El precio es mayor a 0"
      - "Se incluye la moneda (USD por defecto)"
      - "Se incluye el timestamp de la consulta"

  - name: "Obtener precio de Dólar"
    given:
      - "El servicio de precios está disponible"
      - "USD es una moneda válida"
    when:
      - "Se solicita el precio del Dólar"
    then:
      - "Se retorna un precio numérico válido"
      - "El precio es mayor a 0"
      - "Se incluye la moneda base"
      - "Se incluye el timestamp de la consulta"

  - name: "Obtener múltiples precios en una sola llamada"
    given:
      - "El servicio de precios está disponible"
      - "Bitcoin, Oro y Dólar son activos válidos"
    when:
      - "Se solicitan los precios de Bitcoin, Oro y Dólar"
    then:
      - "Se retornan 3 precios válidos"
      - "Cada precio es mayor a 0"
      - "Cada precio incluye su moneda"
      - "La respuesta es una lista estructurada"

  - name: "Manejar servicio no disponible"
    given:
      - "El servicio de precios no está disponible"
    when:
      - "Se intenta obtener un precio"
    then:
      - "Se lanza una excepción PriceServiceUnavailable"
      - "El mensaje de error es descriptivo"

  - name: "Manejar activo no válido"
    given:
      - "Se solicita un activo que no existe"
    when:
      - "Se intenta obtener el precio de un activo inválido"
    then:
      - "Se lanza una excepción InvalidAsset"
      - "El mensaje indica cuál es el activo inválido"

properties:
  - name: "Precios siempre positivos"
    description: "Todo precio obtenido debe ser un número positivo"
    constraint: "price > 0"

  - name: "Timestamp válido"
    description: "Cada precio incluye un timestamp válido"
    constraint: "timestamp != null && timestamp <= current_time"

  - name: "Moneda especificada"
    description: "Cada precio incluye información de la moneda"
    constraint: "currency != null && len(currency) > 0"
