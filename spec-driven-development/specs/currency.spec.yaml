spec:
  name: CurrencyExchangeRateFetcher
  description: Servicio para obtener tasas de cambio de monedas
  parent: PriceFetcher
  version: 1.0.0

scenarios:
  - name: "Obtener tasa de cambio USD/EUR"
    given:
      - "Se solicita la tasa de cambio de USD a EUR"
      - "El servicio de tasas de cambio está disponible"
    when:
      - "Se obtiene la tasa de cambio"
    then:
      - "La tasa es un número positivo"
      - "La moneda base es 'USD'"
      - "La moneda destino es 'EUR'"
      - "La tasa típicamente está entre 0.8 y 1.2"

  - name: "Obtener tasa de cambio USD/MXN"
    given:
      - "Se solicita la tasa de cambio de USD a MXN (Peso Mexicano)"
      - "El servicio de tasas de cambio está disponible"
    when:
      - "Se obtiene la tasa de cambio"
    then:
      - "La tasa es un número positivo"
      - "La moneda base es 'USD'"
      - "La moneda destino es 'MXN'"
      - "La tasa típicamente está entre 15 y 25"

  - name: "Obtener tasa de cambio USD/ARS"
    given:
      - "Se solicita la tasa de cambio de USD a ARS (Peso Argentino)"
      - "El servicio de tasas de cambio está disponible"
    when:
      - "Se obtiene la tasa de cambio"
    then:
      - "La tasa es un número positivo"
      - "La moneda base es 'USD'"
      - "La moneda destino es 'ARS'"
      - "La tasa es válida según mercado actual"

  - name: "Manejar moneda no válida"
    given:
      - "Se solicita una tasa de cambio con una moneda que no existe"
    when:
      - "Se intenta obtener la tasa de cambio"
    then:
      - "Se lanza una excepción InvalidCurrency"
      - "El mensaje indica cuál moneda es inválida"

data_types:
  ExchangeRate:
    base_currency: string # "USD"
    target_currency: string # "EUR", "MXN", "ARS"
    rate: float # > 0
    timestamp: datetime # ISO 8601
    source: string # API source identifier

examples:
  usd_to_eur:
    base_currency: "USD"
    target_currency: "EUR"
    rate: 0.92
    timestamp: "2026-06-09T10:30:00Z"
    source: "fixer.io"

  usd_to_mxn:
    base_currency: "USD"
    target_currency: "MXN"
    rate: 17.45
    timestamp: "2026-06-09T10:30:00Z"
    source: "open_exchange_rates"

  usd_to_ars:
    base_currency: "USD"
    target_currency: "ARS"
    rate: 850.50
    timestamp: "2026-06-09T10:30:00Z"
    source: "bcra"

valid_currency_codes:
  - "EUR"
  - "GBP"
  - "JPY"
  - "AUD"
  - "CAD"
  - "CHF"
  - "CNY"
  - "INR"
  - "MXN"
  - "ARS"
  - "BRL"
  - "CLP"
