spec:
  name: GoldPriceFetcher
  description: Servicio específico para obtener precio de Oro
  parent: PriceFetcher
  version: 1.0.0

scenarios:
  - name: "Oro debe cotizar en USD por onza"
    given:
      - "Se solicita el precio de Oro sin especificar moneda"
    when:
      - "Se obtiene el precio"
    then:
      - "La moneda es 'USD'"
      - "La unidad es 'troy ounce (oz t)'"
      - "El símbolo es 'XAU'"

  - name: "Precio de Oro es razonable"
    given:
      - "Se obtiene el precio de Oro"
    when:
      - "El precio es procesado"
    then:
      - "El precio está entre 1,000 y 3,000 USD por onza"
      - "Hay máximo 2 decimales"

  - name: "Oro identifica correctamente su símbolo"
    given:
      - "Se solicita información de Oro"
    when:
      - "Se obtiene la respuesta"
    then:
      - "El símbolo es 'XAU'"
      - "El nombre es 'Gold' o 'Oro'"
      - "La unidad es 'troy ounce'"

data_types:
  GoldPrice:
    symbol: string # "XAU"
    name: string # "Gold"
    price: float # > 0
    currency: string # "USD"
    unit: string # "troy ounce"
    timestamp: datetime # ISO 8601
    change_24h: float # Porcentaje de cambio en 24 horas
    source: string # API source identifier

examples:
  valid_gold_price:
    symbol: "XAU"
    name: "Gold"
    price: 2045.50
    currency: "USD"
    unit: "troy ounce"
    timestamp: "2026-06-09T10:30:00Z"
    change_24h: 0.5
    source: "london_metal_exchange"

  another_valid_price:
    symbol: "XAU"
    name: "Oro"
    price: 2100.75
    currency: "USD"
    unit: "troy ounce"
    timestamp: "2026-06-09T11:45:00Z"
    change_24h: -0.3
    source: "bls"
